<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jayraffe Complex | User Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../global.js"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; color: white; }
        .glass-panel { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-glow { box-shadow: 0 0 15px rgba(34, 211, 238, 0.3); }
    </style>
</head>
<body class="min-h-screen">
    <nav class="w-full px-6 py-4 flex justify-between items-center glass-panel sticky top-0 z-50">
        <a href="../" class="text-xl font-black tracking-tighter hover:opacity-80 transition">
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">JAYRAFFE COMPLEX</span>
        </a>
    </nav>

   <main class="container mx-auto px-4 py-12 max-w-6xl">
    <div class="glass-panel p-8 rounded-3xl flex flex-col items-center text-center mb-16 max-w-2xl mx-auto relative">
        <div id="profile-avatar" class="w-32 h-32 rounded-full bg-slate-800 border-4 border-cyan-500/50 mb-6 flex items-center justify-center text-4xl neon-glow overflow-hidden">
            👤
        </div>

        <h1 id="profile-name" class="text-4xl font-black uppercase italic tracking-tighter mb-2">Loading...</h1>
        <p id="profile-email" class="text-slate-500 font-mono text-sm mb-8 tracking-widest uppercase">Unauthorized</p>

        <div class="w-full max-w-md mx-auto mb-8 p-4 bg-slate-900/50 rounded-2xl border border-white/5 group relative">
        <p class="text-[10px] text-cyan-400 font-bold uppercase tracking-[0.2em] mb-2">Citizen Status / Bio</p>
    
        <p id="display-bio" class="text-slate-300 italic text-sm leading-relaxed">
            "Fetching status from the archives..."
        </p>

        <button onclick="updateBio()" class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-all text-[10px] bg-white/10 hover:bg-cyan-500 px-2 py-1 rounded font-bold">
            EDIT
        </button>
    </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full mb-10">
            <div class="p-4 bg-slate-900/50 rounded-2xl border border-white/5">
                <p class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest">Rank</p>
                <p class="text-xl font-black uppercase">Citizen</p>
            </div>
            <div class="p-4 bg-slate-900/50 rounded-2xl border border-white/5">
                <p class="text-[10px] text-purple-400 font-bold uppercase tracking-widest">Status</p>
                <p class="text-xl font-black uppercase">Active</p>
            </div>
            <div class="p-4 bg-slate-900/50 rounded-2xl border border-white/5">
                <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest italic">how peak ace attorney is</p>
                <p class="text-xl font-black">999.9%</p>
            </div>
        </div>

        <button onclick="handleSignOut()" class="px-8 py-3 bg-red-500/10 border border-red-500/50 text-red-500 rounded-full font-bold hover:bg-red-500 hover:text-white transition-all uppercase tracking-widest text-xs">
            Sign Out
        </button>
    </div>

    <div class="h-px w-full bg-gradient-to-r from-transparent via-white/10 to-transparent mb-16"></div>

    <div class="w-full">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-black uppercase tracking-widest flex items-center gap-3">
                <span class="text-pink-500">❤️</span> Your Favorites
            </h2>
            <span class="text-[10px] text-slate-500 font-mono uppercase tracking-widest">Jayraffe Archives v1.0</span>
        </div>

        <div id="favorites-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 w-full">
            </div>
    </div>
</main>
    

    <script>
        // Specific logic for the profile page
async function loadProfile() {
    const client = window.supabaseClient;
    
    if (!client) {
        setTimeout(loadProfile, 100);
        return;
    }

    // 1. Fetch user session
    const { data: { user } } = await client.auth.getUser();

    // 2. If no user, redirect to auth
    if (!user) {
        window.location.href = "../auth/";
        return;
    }

    // --- EVERYTHING BELOW THIS IS NOW INSIDE THE USER CHECK ---

    // 3. Update Profile UI (Name and Email)
    // Add this to your loadProfile function
    document.getElementById('display-bio').innerText = profileData?.bio || "No bio set.";
    document.getElementById('profile-name').innerText = user.user_metadata.display_name || "New Citizen";
    document.getElementById('profile-email').innerText = user.email;

    if (user.user_metadata.avatar_url) {
        document.getElementById('profile-avatar').innerHTML = `<img src="${user.user_metadata.avatar_url}" class="w-full h-full object-cover">`;
    }

    // 4. Load Favorites from Database
    const { data: profile, error } = await client
    .from('profiles')
    .select('favorites, bio') 
    .eq('id', user.id)
    .single();

// 1. Handle the Bio
const bioElement = document.getElementById('display-bio');
if (profile && profile.bio) {
    bioElement.innerText = `"${profile.bio}"`;
} else {
    bioElement.innerText = "No status set. Click edit to update.";
}

    const favIds = profile?.favorites || [];
    const grid = document.getElementById('favorites-grid');
    grid.innerHTML = ''; 

    // 5. Check if list is empty
    if (favIds.length === 0) {
        grid.innerHTML = `
            <div class="col-span-full text-center py-12 text-slate-500">
                <p>No activities saved yet.</p>
                <a href="../" class="text-cyan-400 hover:underline font-bold">Go explore the Complex!</a>
            </div>`;
    } else {
        // 6. Loop and render cards
        favIds.forEach(id => {
            const game = window.activityLibrary[id];
            if (game) {
                const card = document.createElement('div');
                card.className = "glass-panel p-4 rounded-xl border border-white/10 hover:border-cyan-500/50 transition-all duration-300 hover:-translate-y-2 group flex flex-col h-full w-full min-w-0";
                card.innerHTML = `
    <div class="aspect-video w-full mb-4 overflow-hidden rounded-lg">
        <img src="../${game.banner}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
    </div>
    <div class="flex-grow">
        <h3 class="font-bold uppercase tracking-tighter text-sm line-clamp-2">${game.title}</h3>
        <p class="text-[10px] text-slate-500 mt-1 mb-4 tracking-widest uppercase">${game.tags}</p>
    </div>
    <a href="../experience/?id=${id}" class="block text-center py-2 bg-slate-800 hover:bg-cyan-600 rounded-lg text-[10px] font-black transition uppercase tracking-widest mt-auto">Launch</a>
`;
                grid.appendChild(card);
            }
        });
    }
}

async function updateBio() {
    const currentBio = document.getElementById('display-bio').innerText.replace(/"/g, "");
    const newBio = prompt("Update your Citizen Status:", currentBio);

    // If they didn't hit cancel and the bio isn't empty
    if (newBio !== null) {
        const client = window.supabaseClient;
        const { data: { user } } = await client.auth.getUser();

        const { error } = await client
            .from('profiles')
            .update({ bio: newBio })
            .eq('id', user.id);

        if (error) {
            alert("Archive Update Failed: " + error.message);
        } else {
            document.getElementById('display-bio').innerText = `"${newBio}"`;
        }
    }
}
// CRITICAL: Initialize on window load
window.addEventListener('load', loadProfile);
    </script>
</body>
</html>
