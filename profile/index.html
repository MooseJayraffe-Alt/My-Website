<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jayraffe Complex | User Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../global.js"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; color: white; }
        .glass-panel { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-glow { box-shadow: 0 0 15px rgba(34, 211, 238, 0.3); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="w-full px-6 py-4 flex justify-between items-center glass-panel sticky top-0 z-50">
        <a href="../" class="text-xl font-black tracking-tighter hover:opacity-80 transition">
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">JAYRAFFE COMPLEX</span>
        </a>
    </nav>

    <main class="container mx-auto px-4 py-12 max-w-4xl">
        <div class="glass-panel p-8 rounded-3xl flex flex-col items-center text-center">
            
            <div id="profile-avatar" class="w-32 h-32 rounded-full bg-slate-800 border-4 border-cyan-500/50 mb-6 flex items-center justify-center text-4xl neon-glow overflow-hidden">
                👤
            </div>

            <h1 id="profile-name" class="text-4xl font-black uppercase italic tracking-tighter mb-2">Loading Username...</h1>
            <p id="profile-email" class="text-slate-500 font-mono text-sm mb-8 tracking-widest uppercase">Unauthorized Access</p>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full mb-12">
                <div class="p-4 bg-slate-900/50 rounded-2xl border border-white/5">
                    <p class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest">Rank</p>
                    <p class="text-xl font-black">CITIZEN</p>
                </div>
                <div class="p-4 bg-slate-900/50 rounded-2xl border border-white/5">
                    <p class="text-[10px] text-purple-400 font-bold uppercase tracking-widest">Status</p>
                    <p class="text-xl font-black">ACTIVE</p>
                </div>
                <div class="p-4 bg-slate-900/50 rounded-2xl border border-white/5">
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">how peak ace attorney is and how unpeak chara is</p>
                    <p class="text-xl font-black">999.9%</p>
                </div>
                <div class="h-px w-full bg-gradient-to-r from-white/10 to-transparent mb-12"></div>

        <h2 class="text-xl font-bold uppercase tracking-widest mb-8 flex items-center gap-3">
            <span class="text-pink-500">❤️</span> Your Favorites
        </h2>

        <div id="favorites-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <p id="no-favs" class="hidden col-span-full text-slate-500 italic">No favorites saved yet. Go play some games!</p>
        </div>

        </div>
            </div>

            <button onclick="handleSignOut()" class="px-8 py-3 bg-red-500/10 border border-red-500/50 text-red-500 rounded-full font-bold hover:bg-red-500 hover:text-white transition-all uppercase tracking-widest text-xs">
                Sign Out
            </button>

    

    <script>
        // Specific logic for the profile page
        async function loadProfile() {
        const client = window.supabaseClient;
        if (!client) {
            setTimeout(loadProfile, 100);
            return;
        }

            const { data: { user } } = await supabaseClient.auth.getUser();

            if (!user) {
                // If someone tries to view the profile while logged out, send them away
                window.location.href = "auth/";
                return;
            }

            const { data: profile } = await client.from('profiles').select('favorites').eq('id', user.id).single();
    const favIds = profile?.favorites || [];
    const grid = document.getElementById('favorites-grid'); // Make sure you have this ID in your HTML
    
    grid.innerHTML = ''; // Clear "Loading..." text

    // 2. Map those IDs to your Activity Library
    favIds.forEach(id => {
        const game = window.activityLibrary[id];
        if (game) {
            const card = document.createElement('div');
            card.className = "glass-panel p-4 rounded-xl border border-white/10 hover:border-cyan-500/50 transition group";
            card.innerHTML = `
                <img src="../${game.banner}" class="w-full h-32 object-cover rounded-lg mb-4">
                <h3 class="font-bold uppercase tracking-tighter">${game.title}</h3>
                <p class="text-xs text-slate-500 mb-4">${game.tags}</p>
                <a href="../play/?id=${id}" class="block text-center py-2 bg-slate-800 hover:bg-cyan-600 rounded-lg text-xs font-bold transition">LAUNCH</a>
            `;
            grid.appendChild(card);
        }

    if (favIds.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500">
        <p>No activities saved yet.</p>
        <a href="../" class="text-cyan-400 hover:underline">Go explore the Complex!</a>
        </div>`;
}   
    });
    }

   
            document.getElementById('profile-name').innerText = user.user_metadata.display_name || "just monika or smth";
            document.getElementById('profile-email').innerText = user.email;

            if (user.user_metadata.avatar_url) {
                document.getElementById('profile-avatar').innerHTML = `<img src="${user.user_metadata.avatar_url}" class="w-full h-full object-cover">`;
            }

        // Wait for global.js to finish loading the session
        document.addEventListener('load', loadProfile);
    </script>
</body>
</html>
