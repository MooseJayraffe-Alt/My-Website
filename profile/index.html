<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jayraffe Complex | User Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="global.js"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; color: white; }
        .glass-panel { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-glow { box-shadow: 0 0 15px rgba(34, 211, 238, 0.3); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="w-full px-6 py-4 flex justify-between items-center glass-panel sticky top-0 z-50">
        <a href="./" class="text-xl font-black tracking-tighter hover:opacity-80 transition">
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">JAYRAFFE COMPLEX</span>
        </a>
    </nav>

    <main class="container mx-auto px-4 py-12 max-w-4xl">
        <div class="glass-panel p-8 rounded-3xl flex flex-col items-center text-center">
            
            <div id="profile-avatar" class="w-32 h-32 rounded-full bg-slate-800 border-4 border-cyan-500/50 mb-6 flex items-center justify-center text-4xl neon-glow overflow-hidden">
                👤
            </div>

            <h1 id="profile-name" class="text-4xl font-black uppercase italic tracking-tighter mb-2">Loading Identity...</h1>
            <p id="profile-email" class="text-slate-500 font-mono text-sm mb-8 tracking-widest uppercase">Unauthorized Access</p>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full mb-12">
                <div class="p-4 bg-slate-900/50 rounded-2xl border border-white/5">
                    <p class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest">Rank</p>
                    <p class="text-xl font-black">CITIZEN</p>
                </div>
                <div class="p-4 bg-slate-900/50 rounded-2xl border border-white/5">
                    <p class="text-[10px] text-purple-400 font-bold uppercase tracking-widest">Status</p>
                    <p class="text-xl font-black">ACTIVE</p>
                </div>
                <div class="p-4 bg-slate-900/50 rounded-2xl border border-white/5">
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">Uptime</p>
                    <p class="text-xl font-black">99.9%</p>
                </div>
            </div>

            <button onclick="handleSignOut()" class="px-8 py-3 bg-red-500/10 border border-red-500/50 text-red-500 rounded-full font-bold hover:bg-red-500 hover:text-white transition-all uppercase tracking-widest text-xs">
                Terminate Session (Sign Out)
            </button>
        </div>
    </main>

    <script>
        // Specific logic for the profile page
        async function loadProfile() {
            const { data: { user } } = await supabase.auth.getUser();

            if (!user) {
                // If someone tries to view the profile while logged out, send them away
                window.location.href = "auth/";
                return;
            }

            document.getElementById('profile-name').innerText = user.user_metadata.full_name || "Citizen";
            document.getElementById('profile-email').innerText = user.email;

            if (user.user_metadata.avatar_url) {
                document.getElementById('profile-avatar').innerHTML = `<img src="${user.user_metadata.avatar_url}" class="w-full h-full object-cover">`;
            }
        }

        // Wait for global.js to finish loading the session
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
